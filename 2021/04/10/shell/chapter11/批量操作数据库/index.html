    </h1>

    <div class="article-entry" itemprop="articleBody">
      
        <h3 id="批量创建数据库"><a href="#批量创建数据库" class="headerlink" title="批量创建数据库"></a>批量创建数据库</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash">!/bin/bash</span></span><br><span class="line">USER=root</span><br><span class="line">PASSWORD=123456</span><br><span class="line">LOGINCMD="mysql -u$USER -p$PASSWORD"</span><br><span class="line"></span><br><span class="line">for dbname in oldBody oldgirl xxx yyy</span><br><span class="line">do</span><br><span class="line"><span class="meta">  #</span><span class="bash"> 不存在则创建</span></span><br><span class="line"><span class="meta">  $</span><span class="bash">LOGINCMD -e <span class="string">"create database IF NOT EXISTS <span class="variable">$dbname</span>"</span></span></span><br><span class="line"><span class="meta">  #</span><span class="bash"> 强制删除，重新创建</span></span><br><span class="line"><span class="meta">  #</span><span class="bash"> <span class="variable">$LOGINCMD</span> -e <span class="string">"drop database <span class="variable">$dbname</span>; create database <span class="variable">$dbname</span>"</span></span></span><br><span class="line">done</span><br></pre></td></tr></table></figure>

<h3 id="数据库批量转存数据"><a href="#数据库批量转存数据" class="headerlink" title="数据库批量转存数据"></a>数据库批量转存数据</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash">!/bin/bash</span></span><br><span class="line">USER=root</span><br><span class="line">DBPATH=./temp</span><br><span class="line">PASSWORD=123456</span><br><span class="line">LOGINCMD="mysql -u$USER -p$PASSWORD"</span><br><span class="line">DUMPCMD="mysqldump -u$USER -p$PASSWORD"</span><br><span class="line"></span><br><span class="line"><span class="meta">#</span><span class="bash"> 指定拷贝</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> <span class="keyword">for</span> dbname <span class="keyword">in</span> oldBody oldgirl xxx yyy</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#</span><span class="bash"> 获取mysql中的所需要数据库转存</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> <span class="keyword">for</span> dbname <span class="keyword">in</span> `<span class="variable">$&#123;LOGINCMD&#125;</span> -e <span class="string">"show databases;"</span> | sed <span class="string">'1d'</span> | egrep -v <span class="string">"mysql|schema"</span>`</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> <span class="keyword">do</span></span></span><br><span class="line"><span class="meta">#</span><span class="bash">   <span class="variable">$DUMPCMD</span> <span class="variable">$dbname</span> | gzip &gt; <span class="variable">$DBPATH</span>/<span class="variable">$&#123;dbname&#125;</span>_$(date +%F)_sql.gz</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> <span class="keyword">done</span></span></span><br><span class="line"></span><br><span class="line">rm -rf $DBPATH</span><br><span class="line">for dbname in `$&#123;LOGINCMD&#125; -e "show databases;" | sed '1d' | egrep -v "mysql|schema"`</span><br><span class="line">do</span><br><span class="line">  mkdir -p $DBPATH/$&#123;dbname&#125;</span><br><span class="line">  for table in `$&#123;LOGINCMD&#125; -e "use $&#123;dbname&#125;; show tables;" | sed '1d'`</span><br><span class="line">  do</span><br><span class="line">    $DUMPCMD $dbname $table | gzip &gt; $DBPATH/$&#123;dbname&#125;/$&#123;table&#125;_$(date +%F)_sql.gz</span><br><span class="line">  done</span><br><span class="line">done</span><br></pre></td></tr></table></figure>

<h3 id="数据库批量创建表及插入数据"><a href="#数据库批量创建表及插入数据" class="headerlink" title="数据库批量创建表及插入数据"></a>数据库批量创建表及插入数据</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash">!/bin/bash</span></span><br><span class="line">USER=root</span><br><span class="line">PASSWORD=123456</span><br><span class="line">LOGINCMD="mysql -u$USER -p$PASSWORD"</span><br><span class="line"><span class="meta">#</span><span class="bash"> 指定拷贝</span></span><br><span class="line">for dbname in oldBody oldgirl xxx yyy</span><br><span class="line">do</span><br><span class="line"><span class="meta">  $</span><span class="bash">LOGINCMD -e <span class="string">"use <span class="variable">$&#123;dbname&#125;</span>; create table if not exsits test(id int, name varchar(12)); insert into test values (1, 'testData')"</span></span></span><br><span class="line">done</span><br></pre></td></tr></table></figure>

<h3 id="数据库批量查询数据"><a href="#数据库批量查询数据" class="headerlink" title="数据库批量查询数据"></a>数据库批量查询数据</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash">!/bin/bash</span></span><br><span class="line">USER=root</span><br><span class="line">PASSWORD=123456</span><br><span class="line">LOGINCMD="mysql -u$USER -p$PASSWORD"</span><br><span class="line">for dbname in oldBody oldgirl xxx yyy</span><br><span class="line">do</span><br><span class="line"><span class="meta">  $</span><span class="bash">LOGINCMD -e <span class="string">"select * from <span class="variable">$&#123;dbname&#125;</span>.test\G;"</span></span></span><br><span class="line">done</span><br></pre></td></tr></table></figure>
